# Configure the input data streams below
#################################################################
[DataStreams]
	# The selected stream list, which are configured in section [DataStream#] below
	EnabledStream =PCAP_File
	
	# Max allowed delay for each stream, in seconds
	# if no data is received for a stream more than [AllowedMaxStreamDelay] seconds, the stream is treat as INACTIVE, until new data is received.
	AllowedMaxStreamDelay = 60
	TimeZone = +8
	
# Configure each DataStream. If the stream is not selected in the EnabledStream list, it will not take effect.

[PCAP_File]
	# Stream type, PCAP_FILE or PCAP_IF or QCAP_IF
	Type =PCAP_FILE
	
	#offline or online, default online
	#offline: exit after decoding
	#online:run all the time
	WorkMode=offline

	# Data input directory
	Directory =D:\Project\Decoder\decode6\ĐÂ˝¨ ÎÄĽţĽĐ\TMP_12345\
	
