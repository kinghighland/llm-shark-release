[Generic]
	# 1: cp master mode; 2: cp slave mode; 3: up mode; 0/4: cp/up mode;
	DecoderMode = 0
	
	# dispatch thread number. default is processed by decoder. Range:[0-5]
	DispatchNum = 0
	
	# CP dispatch thread number. default is processed by decoder. Range:[0-5]
	DispatchNum_CP = 1
	
	#S1-MME thread number. default is processed by decoder. Range:[0-32]
	S1CThreadNum = 0
	
	#S11 thread number. default is processed by decoder. Range:[0-32]
	S11ThreadNum = 0
	
	#Mc thread number. default is processed by decoder. Range:[0-32]
	MCThreadNum = 0
	
	#Delay cache msgs. valid when memory more than 64G byte. Range:[1024000-10240000]
	Delay_Cache_Msgs = 1024000

    #Sgs and GnGp thread core Switch: On or Off, default is Off
	#On means GnGp and Sgs threads have a single core, Off means share a core with scp
	Sgs_GnGp_Single_Core = Off

    #S1 Decoding Switch: On or Off, default is On
	#On means S1 features are enabled, Off means both are disabled
    S1_Decoding_Switch = On

	#S10 Decoding Switch:  On or Off, default is On
	#On means S10 feature is enabled, Off means disabled
    S10_Decoding_Switch = On
	
    #S11 Decoding Switch:  On or Off, default is On
	#On means S11 feature is enabled, Off means disabled
    S11_Decoding_Switch = On

	#S5S8 Decoding Switch: On or Off, default is On
	#On means S5S8 features are enabled, Off means both are disabled
    S5S8_Decoding_Switch = On

    #S6a Decoding Switch:  On or Off, default is On
	#On means S6a feature is enabled, Off means disabled
    S6a_Decoding_Switch = On

    #Sgs Decoding Switch:  On or Off, default is On
	#On means Sgs feature is enabled, Off means disabled
    Sgs_Decoding_Switch = On

    #GnGp Decoding Switch:  On or Off, default is On
	#On means Sgs feature is enabled, Off means disabled
    GnGp_Decoding_Switch = On

    #STa Decoding Switch:  On or Off, default is On
	#On means STa feature is enabled, Off means disabled
    STa_Decoding_Switch = On

	#S2a Decoding Switch: On or Off, default is On
	#On means S2a feature is enabled, Off means disabled
    S2a_Decoding_Switch = On

	#Gx Decoding Switch: On or Off, default is On
	#On means Gx feature is enabled, Off means disabled
    Gx_Decoding_Switch = On

	#Gy Decoding Switch: On or Off, default is On
	#On means Gy feature is enabled, Off means disabled
    Gy_Decoding_Switch = On
	
	#Mc Decoding Switch:  On or Off, default is On
	#On means Mc feature is enabled, Off means disabled
    Mc_Decoding_Switch = Off

	#Mc with lte Imsi Filter Switch:  On or Off, default is On
	#On means feature is enabled, Off means disabled
    Mc_ImsiFilter_Switch = On

	#Mc Only decoding CSFB Msg Switch: On or Off, default is Off
	#On means feature is enabled, Off means disabled	
	Mc_Decoding_Only_CSFB = Off

	#NAS Decrypt Switch: On or Off or Auto, default is Auto
	#On means nas layer decrypt is enabled, Off means disabled, auto means learning
	Nas_Decrypt_Switch = Auto

	#S1U Dispatch Links Switch: On or Off, default is On
	#On means s1u packet dispatch by tcp links, Off means s1u packet dispatch by imsi
	S1U_Dispatch_Links = Off

	# S6a Duplicate Msg Filter Switch: On or Off, default is Off
	# On means S6a feature is enabled, Off means disabled
	S6a_DupMsgFilter_Switch = Off
	
	# S11 Duplicate Msg Filter Switch: On or Off, default is Off
	# On means S11 feature is enabled, Off means disabled
	S11_DupMsgFilter_Switch = Off
	
	# S5S8 Duplicate Msg Filter Switch: On or Off, default is Off
	# On means S5S8 feature is enabled, Off means disabled
	S5S8_DupMsgFilter_Switch = Off
	
	# S10 Duplicate Msg Filter Switch: On or Off, default is Off
	# On means S10 feature is enabled, Off means disabled
	S10_DupMsgFilter_Switch = On
	
	#Support BREC SDK lib enable, TRUE or FALSE
	LibBRECEnable = TRUE

	#Support numberic binary rules enable, TRUE or FALSE
	NumericBinary = FALSE

	#Support numberic ftp rules enable, TRUE or FALSE
	NumericFtp    = FALSE

	#Converge session enable, TRUE or FALSE
	ConvergeEnable = TRUE

	#Converge timeout timer(s), default is 60s
	ConvergeTimer = 60

	#Learning timer(s), default is 60s
	LearningTimer = 15

	#Dns Learning timer(minutes), default is 60minutes=1hour
	DnsLearningTime = 60
	
	#duplicate Msg check mode: AUTO or TRUE or FALSE, by default: AUTO
	DupMsgCheck = AUTO

	#Mids function enable, TRUE or FALSE 
	MidsEnable = FALSE

	#WapGateWay, CMCC:10.0.0.172, CUCC: :10.0.0.172, CTCC:10.0.0.200
	Wap_GateWay = 10.0.0.172

	#The Number of 'N' for Outputing the First 'N' Downlink Payload Packet's TimeStamp, default is 100
	TS_PL_PKT_DL_N = 100
	
	#Decoder instance id
	InstanceId = 1

	#Decoder restart times
	RestartId = 0

	#Heartbeat interval timer
	HeartbeatInterval = 200

	# Log file max size, in Byte
	LogFileMaxSize = 67108865

	# In case no USB check.
	DefaultFlowRateLimitation=1000

	# The second output path 
	OutputPath = 

[ImeiLearning]
	ImeiFilePath=./

	# in seconds. hourly by default
	ImeiPersistenceDuration=3600

	# Bufferred imei updates before flushed into imeiTable file
	ImeiWriteBufferSize=50000

